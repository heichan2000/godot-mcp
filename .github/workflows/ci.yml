name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: lint + typecheck + unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fails the job on a high-or-critical advisory anywhere in the
      # dependency tree; low/moderate advisories in transitive dev-only
      # deps (e.g. build tooling) are common noise that don't warrant
      # blocking every PR, so they're intentionally NOT gated here - see
      # godot-prd.md §7.6. Bump/adjust the level deliberately if that
      # trade-off ever needs revisiting.
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      # Runs the unit suite AND enforces the coverage gate scoped to the
      # pure layers (schemas.ts, godot/paths.ts, godot/values.ts, config.ts,
      # registry.ts - see vitest.config.ts's COVERAGE_INCLUDE) in one step;
      # `vitest run --coverage` already reports pass/fail for every test on
      # top of the coverage thresholds, so there is no separate plain
      # `npm test` step to keep in sync.
      - name: Unit tests (with coverage gate on the pure layers)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  integration:
    name: integration (ubuntu, Godot ${{ matrix.godot_version }} editor under xvfb)
    strategy:
      fail-fast: false
      matrix:
        # Rolling policy (REQ-A-07): the latest 2 stable Godot minors. Bump
        # both entries deliberately when a new stable minor ships; #77 gates
        # the release on this matrix being green.
        godot_version: ["4.6-stable", "4.7-stable"]
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: ${{ matrix.godot_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Godot ${{ env.GODOT_VERSION }} (linux x86_64, full editor build)
        run: |
          curl -sL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip -d godot-bin
          chmod +x "godot-bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          echo "GODOT_PATH=$PWD/godot-bin/Godot_v${GODOT_VERSION}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Sanity-check the downloaded Godot binary
        run: "$GODOT_PATH --version"

      # The #64 feasibility spike, enforced forever after: a real editor
      # process under a virtual display, the bundled addon, a WebSocket
      # handshake, and tool calls through the bridge.
      - name: Integration tests (real editor under xvfb)
        run: xvfb-run --auto-servernum npm run test:integration
